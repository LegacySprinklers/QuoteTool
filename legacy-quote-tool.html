<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Legacy Sprinklers — Field Quote</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0f1117;font-family:'Inter','Helvetica Neue',Arial,sans-serif;color:#f0f0f0;min-height:100vh;}
  input,select,textarea{font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:#1e6b3c !important;outline:none;}
  select option{background:#161b27;color:#f0f0f0;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:#0f1117;}
  ::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback} = React;

// ── PRICING CONSTANTS ──────────────────────────────
const LABOR_RATE      = 97;
const LABOR_MULT      = 1.30;
const MAT_MULT        = 1.35;
const MARGIN          = 0.50;
const LARGE_THRESHOLD = 8;
const LARGE_MULT      = 1.75;
// ──────────────────────────────────────────────────

const TECHS = ["Orion","Vick","Eric","Tyler"];

function isLarge(h){ return (parseFloat(h)||0) >= LARGE_THRESHOLD; }

function calcPrice(h,m){
  const hrs=parseFloat(h)||0;
  const mat=parseFloat(m)||0;
  if(isLarge(h)) return (hrs*LABOR_RATE*LARGE_MULT)+(mat*MAT_MULT);
  return ((hrs*LABOR_MULT*LABOR_RATE)+(mat*MAT_MULT))/MARGIN;
}

function fmt(val){
  if(!val && val!==0) return "—";
  return "$"+Number(val).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",");
}

const inp={width:"100%",background:"#0f1117",border:"1px solid #1e2a3a",borderRadius:8,padding:"10px 12px",color:"#f0f0f0",fontSize:15,outline:"none",boxSizing:"border-box"};
const btnBase={padding:"14px 18px",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",marginTop:8};

function SL({children}){return <div style={{fontSize:11,color:"#1e6b3c",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12,paddingBottom:8,borderBottom:"1px solid #1e2a3a"}}>{children}</div>;}
function FL({children}){return <div style={{fontSize:11,color:"#6b7a8d",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>{children}</div>;}
function QR({label,value}){return <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}><span style={{color:"#6b7a8d"}}>{label}</span><span>{value}</span></div>;}

function StepBar({current, goTo}){
  const steps=["Job Info","Materials","Review","Final"];
  return(
    <div style={{display:"flex",alignItems:"center",padding:"12px 16px",background:"#0f1117",borderBottom:"1px solid #1e2a3a",overflowX:"auto"}}>
      {steps.map((s,i)=>{
        const num=i+1;
        const active=num===current;
        const done=num<current;
        const tappable=done;
        return(
          <React.Fragment key={s}>
            <div
              onClick={()=>tappable&&goTo(num)}
              style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,cursor:tappable?"pointer":"default",opacity:tappable||active?1:0.5}}
            >
              <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,
                background:done||active?"#1e6b3c":"#1e2a3a",
                color:done||active?"#fff":"#3a4a5a",
                border:active?"2px solid #2ecc71":done?"2px solid #2ecc71":"2px solid transparent"}}>
                {done?"✓":num}
              </div>
              <div style={{fontSize:11,color:active?"#f0f0f0":done?"#2ecc71":"#3a4a5a",fontWeight:active?700:400,whiteSpace:"nowrap",textDecoration:tappable?"underline":"none"}}>{s}</div>
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:1,background:"#1e2a3a",margin:"0 8px",minWidth:8}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function CopyBlock({label,text}){
  const [copied,setCopied]=useState(false);
  const copy=()=>{
    try{
      if(navigator.clipboard&&window.isSecureContext){
        navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
      } else { fallbackCopy(text); }
    }catch(e){fallbackCopy(text);}
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  };
  const fallbackCopy=(t)=>{
    const el=document.createElement("textarea");
    el.value=t;el.style.position="fixed";el.style.opacity="0";
    document.body.appendChild(el);el.focus();el.select();
    try{document.execCommand("copy");}catch(e){}
    document.body.removeChild(el);
  };
  return(
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={{fontSize:11,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
        <button onClick={copy} style={{background:copied?"#0d3d20":"#1e2a3a",border:copied?"1px solid #2ecc71":"1px solid #2a3a4a",color:copied?"#2ecc71":"#f0f0f0",borderRadius:6,padding:"5px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>
          {copied?"Copied!":"Copy"}
        </button>
      </div>
      <div style={{background:"#0f1117",border:"1px solid #1e2a3a",borderRadius:8,padding:"12px 14px",fontSize:14,color:"#c8d0da",lineHeight:1.75,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{text}</div>
    </div>
  );
}

function TrencherAlert({advice}){
  if(!advice) return null;
  const map={
    yes:{bg:"#0d1f14",border:"#1e6b3c",badge:"#0d3d20",badgeText:"#2ecc71",label:"✓ USE TRENCHER"},
    no: {bg:"#1a0a0a",border:"#6b1e1e",badge:"#3d0d0d",badgeText:"#e74c3c",label:"✗ HAND DIG"},
    call:{bg:"#1a1500",border:"#6b5a00",badge:"#3d3000",badgeText:"#f0c040",label:"? TECH'S CALL"},
  };
  const c=map[advice.verdict]||map.call;
  return(
    <div style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:10,padding:"16px",marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
        <div style={{background:c.badge,color:c.badgeText,fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:20,letterSpacing:"0.08em",textTransform:"uppercase"}}>{c.label}</div>
        {advice.feetDetected&&<div style={{fontSize:12,color:"#6b7a8d"}}>~{advice.feetDetected} ft detected</div>}
      </div>
      <div style={{fontSize:14,color:"#c8d0da",lineHeight:1.75}}>{advice.reasoning}</div>
    </div>
  );
}

async function callClaude(messages, maxTokens=1200){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "anthropic-dangerous-direct-browser-calls":"true"
    },
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:maxTokens,
      messages:messages
    })
  });
  if(!res.ok){
    const err=await res.text();
    throw new Error("API error "+res.status+": "+err);
  }
  const data = await res.json();
  const text = data.content?.find(b=>b.type==="text")?.text||"";
  if(!text) throw new Error("Empty response");
  const start=text.indexOf("{");
  const end=text.lastIndexOf("}");
  if(start===-1||end===-1) throw new Error("No JSON in response");
  return JSON.parse(text.slice(start,end+1));
}

function App(){
  const [tech,setTech]=useState("");
  const [customer,setCustomer]=useState("");
  const [scope,setScope]=useState("");
  const [hours,setHours]=useState("");
  const [techMat,setTechMat]=useState("");
  const [aiMat,setAiMat]=useState(null);
  const [trencher,setTrencher]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [clarQ,setClarQ]=useState(null);
  const [clarA,setClarA]=useState("");
  const [finalMat,setFinalMat]=useState(null);
  const [lineItem,setLineItem]=useState(null);
  const [lineLoading,setLineLoading]=useState(false);
  const [lineError,setLineError]=useState(false);
  const [reviewTitle,setReviewTitle]=useState("");
  const [reviewDesc,setReviewDesc]=useState("");
  const [step,setStep]=useState(1);

  const goTo=(n)=>{
    if(n<step) setStep(n);
  };

  const analyzeScope=async()=>{
    setAiLoading(true);setAiMat(null);setClarQ(null);setTrencher(null);
    try{
      const parsed=await callClaude([{role:"user",content:`You are a materials estimator for a residential sprinkler repair company in Salt Lake County, Utah.

Read the scope carefully and identify ALL specific parts and materials mentioned or clearly implied.

Scope: "${scope}"

Count every specific item mentioned:
- "6 rotor Rainbird 3500s" = 6 rotors at $10 each = $60
- "new timer" or "new controller" = $130 (12-zone Beehive timer, default unless specified otherwise)
- "valve" = $18-28 each
- "manifold" = $45 each
- "backflow" = $65
- spray head = $4, rotor head = $9-10, Rainbird 3500 = $10
- PVC fittings $2-6ea, pipe $6-14 per 10ft, wire $3-15
- capping heads = minimal cost ($2-4 per cap)
- trenching materials (pipe, fittings) based on footage mentioned

Add up all parts to get total raw cost.

Return ONLY this JSON, nothing else:
{
  "estimatedMaterialsCost": <total raw cost number>,
  "rationale": "<list the main items counted and their costs, 1-2 sentences>",
  "confidence": "<high if specific items listed, medium if some guessing, low if very vague>",
  "clarifyingQuestion": <null if confidence is high or medium, or one specific question if low>,
  "trencherAdvice": {
    "applicable": <true if any trenching mentioned>,
    "verdict": "<yes if 50+ ft open ground, no if under 35ft or obstacles, call if 35-50ft gray zone>",
    "feetDetected": <number or null>,
    "reasoning": "<2-3 sentences on trencher vs hand dig tradeoff including 4hr logistics cost>"
  }
}`}]);
      setAiMat({
        estimatedMaterialsCost:parsed.estimatedMaterialsCost,
        rationale:parsed.rationale,
        confidence:parsed.confidence,
        clarifyingQuestion:parsed.clarifyingQuestion
      });
      if(parsed.confidence==="low"&&parsed.clarifyingQuestion) setClarQ(parsed.clarifyingQuestion);
      if(parsed.trencherAdvice?.applicable) setTrencher(parsed.trencherAdvice);
    }catch(e){
      console.error("Scope analysis error:",e);
      setAiMat({error:true,message:e.message});
    }
    setAiLoading(false);
  };

  const refine=async()=>{
    if(!clarA.trim()) return;
    setAiLoading(true);
    try{
      const parsed=await callClaude([{role:"user",content:`Sprinkler repair estimate. Scope: "${scope}". You asked: "${clarQ}". Tech answered: "${clarA}". Update the materials estimate. Return ONLY JSON: {"estimatedMaterialsCost":<number>,"rationale":"<1-2 sentences listing key items>"}`}],600);
      setAiMat(prev=>({...prev,estimatedMaterialsCost:parsed.estimatedMaterialsCost,rationale:parsed.rationale,confidence:"medium"}));
      setClarQ(null);
    }catch(e){console.error(e);}
    setAiLoading(false);
  };

  const generateLineItem=async(matCost)=>{
    setLineLoading(true);setLineItem(null);setLineError(false);
    setReviewTitle("");setReviewDesc("");
    const large=isLarge(hours);
    const price=calcPrice(hours,matCost);
    try{
      const parsed=await callClaude([{role:"user",content:`Write a customer-facing Jobber line item for Legacy Sprinklers, a premium residential sprinkler repair company in Salt Lake County, Utah.

Job:
- Customer: ${customer||"the homeowner"}
- Scope: ${scope}
- Man-hours: ${hours}
- Price: $${Math.round(price)}
${large?"- Large multi-day project":""}

Write:
TITLE: 5-8 words. What the customer gets, not what we do. Specific to this job.
DESCRIPTION: 3-5 sentences. First sentence = the result (what will work after we leave). Middle = what we do to get there, referencing specific components. Last = confident closing statement. Use "we". Never mention hours or pricing.

Return ONLY this JSON with no other text:
{"title":"<your title>","description":"<your description>"}`}],900);
      if(!parsed.title||!parsed.description) throw new Error("Missing fields");
      setLineItem(parsed);
      setReviewTitle(parsed.title);
      setReviewDesc(parsed.description);
    }catch(e){
      console.error("Line item error:",e);
      setLineError(true);
    }
    setLineLoading(false);
  };

  const variance=(()=>{
    if(!aiMat?.estimatedMaterialsCost||!techMat) return null;
    const t=parseFloat(techMat);if(!t) return null;
    return Math.abs(aiMat.estimatedMaterialsCost-t)/Math.max(aiMat.estimatedMaterialsCost,t);
  })();
  const highVar=variance!==null&&variance>0.35;
  const activeMat=finalMat!=null?finalMat:(techMat?parseFloat(techMat):aiMat?.estimatedMaterialsCost);
  const price=calcPrice(hours,activeMat);
  const large=isLarge(hours);

  const useMat=(val)=>{setFinalMat(val);generateLineItem(val);setStep(3);};
  const retryLineItem=()=>{
    const m=finalMat!=null?finalMat:(techMat?parseFloat(techMat):aiMat?.estimatedMaterialsCost);
    if(m) generateLineItem(m);
  };
  const confirmQuote=()=>setStep(4);
  const reset=()=>{
    setTech("");setCustomer("");setScope("");setHours("");setTechMat("");
    setAiMat(null);setClarQ(null);setClarA("");setFinalMat(null);
    setLineItem(null);setLineError(false);setReviewTitle("");setReviewDesc("");
    setTrencher(null);setStep(1);
  };

  return(
    <div style={{minHeight:"100vh",background:"#0f1117",paddingBottom:60}}>
      <div style={{background:"#161b27",borderBottom:"2px solid #1e6b3c",padding:"16px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
        <div style={{width:32,height:32,background:"#1e6b3c",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>💧</div>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>LEGACY SPRINKLERS</div>
          <div style={{fontSize:10,color:"#6b7a8d",letterSpacing:"0.08em",textTransform:"uppercase"}}>Custom Field Quote</div>
        </div>
      </div>

      <StepBar current={step} goTo={goTo}/>

      <div style={{maxWidth:560,margin:"0 auto",padding:"20px 16px"}}>

        {/* ── STEP 1 ── */}
        {step===1&&(
          <div>
            <div style={{marginBottom:24}}>
              <SL>JOB INFO</SL>
              <div style={{display:"flex",gap:10,marginBottom:14}}>
                <div style={{flex:1}}><FL>Tech</FL>
                  <select value={tech} onChange={e=>setTech(e.target.value)} style={inp}>
                    <option value="">Select...</option>
                    {TECHS.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}><FL>Customer Name</FL>
                  <input value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="John Smith" style={inp}/>
                </div>
              </div>
            </div>

            <div style={{marginBottom:24}}>
              <SL>SCOPE OF WORK</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8,lineHeight:1.6}}>Be specific — name exact parts, quantities, measurements, soil conditions, obstacles. The more detail, the better the estimate and the customer quote.</div>
              <textarea value={scope} onChange={e=>{setScope(e.target.value);setAiMat(null);setTrencher(null);}} placeholder="e.g. Replace 6 rotor heads with Rainbird 3500s, cap 2 heads, relocate 2 heads, install new timer, ~25 ft trenching in hard clay." rows={6} style={{...inp,resize:"vertical",lineHeight:1.7}}/>
            </div>

            <div style={{marginBottom:28}}>
              <SL>TOTAL MAN-HOURS ON SITE</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8,lineHeight:1.6}}>Total crew hours. Two techs × 1.5 hrs each = enter 3. Be accurate — this is the biggest cost driver.</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input type="number" min="0" step="0.25" value={hours} onChange={e=>setHours(e.target.value)} placeholder="e.g. 2.5" style={{...inp,width:120,fontSize:18}}/>
                {hours&&<div style={{fontSize:13,color:"#6b7a8d"}}>{hours} man-hr{parseFloat(hours)!==1?"s":""}</div>}
              </div>
            </div>

            <button onClick={()=>{analyzeScope();setStep(2);}} disabled={!scope.trim()||!hours}
              style={{...btnBase,background:(!scope.trim()||!hours)?"#1e2a3a":"#1e6b3c",color:(!scope.trim()||!hours)?"#3a4a5a":"#fff"}}>
              Analyze & Estimate Materials →
            </button>
          </div>
        )}

        {/* ── STEP 2 ── */}
        {step===2&&(
          <div>
            <div style={{background:"#161b27",border:"1px solid #1e2a3a",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontSize:11,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Scope</div>
              <div style={{fontSize:13,color:"#c8d0da",lineHeight:1.7}}>{scope}</div>
              <div style={{marginTop:10,fontSize:13,color:"#4a9a6a"}}>{hours} total man-hr{parseFloat(hours)!==1?"s":""} on site</div>
            </div>

            {aiLoading&&(
              <div style={{textAlign:"center",padding:"30px 0"}}>
                <div style={{color:"#6b7a8d",fontSize:14,marginBottom:8}}>Analyzing scope...</div>
                <div style={{fontSize:12,color:"#3a4a5a"}}>Counting parts and checking equipment needs</div>
              </div>
            )}

            {!aiLoading&&trencher&&(
              <div style={{marginBottom:20}}>
                <SL>EQUIPMENT RECOMMENDATION</SL>
                <TrencherAlert advice={trencher}/>
              </div>
            )}

            {!aiLoading&&(
              <div style={{marginBottom:24}}>
                <SL>AI MATERIALS ESTIMATE</SL>
                {aiMat&&!aiMat.error&&(
                  <div style={{background:"#0d1f14",border:"1px solid #1e6b3c",borderRadius:10,padding:"16px",marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:8}}>
                      <div>
                        <div style={{fontSize:11,color:"#4a9a6a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Suggested Raw Cost</div>
                        <div style={{fontSize:30,fontWeight:800,color:"#2ecc71"}}>{fmt(aiMat.estimatedMaterialsCost)}</div>
                      </div>
                      <div style={{fontSize:11,padding:"4px 12px",borderRadius:20,alignSelf:"flex-start",
                        background:aiMat.confidence==="high"?"#0d3d20":aiMat.confidence==="medium"?"#2d2a0a":"#2d0a0a",
                        color:aiMat.confidence==="high"?"#2ecc71":aiMat.confidence==="medium"?"#f0c040":"#e74c3c",
                        textTransform:"uppercase",fontWeight:700}}>
                        {aiMat.confidence}
                      </div>
                    </div>
                    <div style={{fontSize:13,color:"#88a898",lineHeight:1.7}}>{aiMat.rationale}</div>
                  </div>
                )}
                {aiMat?.error&&(
                  <div style={{background:"#1a0a0a",border:"1px solid #6b1e1e",borderRadius:10,padding:"14px",marginBottom:14}}>
                    <div style={{fontSize:13,color:"#e74c3c",marginBottom:6,fontWeight:600}}>Couldn't analyze scope</div>
                    <div style={{fontSize:12,color:"#b06060",lineHeight:1.6}}>Enter your materials estimate below. Call supply if needed.</div>
                  </div>
                )}
                {clarQ&&(
                  <div style={{background:"#1a1500",border:"1px solid #6b5a00",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
                    <div style={{fontSize:11,color:"#b09040",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Quick clarification needed</div>
                    <div style={{fontSize:14,color:"#f0d060",marginBottom:12,lineHeight:1.6}}>{clarQ}</div>
                    <div style={{display:"flex",gap:8}}>
                      <input value={clarA} onChange={e=>setClarA(e.target.value)} placeholder="Your answer..." style={{...inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&refine()}/>
                      <button onClick={refine} style={{padding:"10px 16px",background:"#6b5a00",color:"#f0d060",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",flexShrink:0}}>Update</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {!aiLoading&&(
              <div style={{marginBottom:20}}>
                <SL>YOUR MATERIALS ESTIMATE</SL>
                <div style={{fontSize:12,color:"#3a4a5a",marginBottom:10,lineHeight:1.6}}>Your best guess at raw cost. Call supply if unsure. Single number only.</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{color:"#6b7a8d",fontSize:20}}>$</span>
                  <input type="number" min="0" step="5" value={techMat} onChange={e=>{setTechMat(e.target.value);setFinalMat(null);}} placeholder="0" style={{...inp,width:150,fontSize:20}}/>
                </div>
              </div>
            )}

            {!aiLoading&&highVar&&techMat&&aiMat&&!aiMat.error&&(
              <div style={{background:"#1a0d00",border:"1px solid #8b4513",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
                <div style={{fontSize:13,color:"#e8821a",fontWeight:700,marginBottom:6}}>{Math.round(variance*100)}% gap — pick one to proceed</div>
                <div style={{fontSize:12,color:"#b06030",marginBottom:14}}>AI: {fmt(aiMat.estimatedMaterialsCost)} · Yours: {fmt(parseFloat(techMat))}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={()=>useMat(aiMat.estimatedMaterialsCost)} style={{flex:1,minWidth:90,padding:"11px 8px",background:"#1e2a3a",color:"#f0f0f0",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>AI {fmt(aiMat.estimatedMaterialsCost)}</button>
                  <button onClick={()=>useMat(parseFloat(techMat))} style={{flex:1,minWidth:90,padding:"11px 8px",background:"#1e2a3a",color:"#f0f0f0",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Mine {fmt(parseFloat(techMat))}</button>
                  <button onClick={()=>useMat((aiMat.estimatedMaterialsCost+parseFloat(techMat))/2)} style={{flex:1,minWidth:90,padding:"11px 8px",background:"#2d1800",color:"#e8821a",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Split {fmt((aiMat.estimatedMaterialsCost+parseFloat(techMat))/2)}</button>
                </div>
              </div>
            )}

            {!aiLoading&&hours&&(techMat||aiMat?.estimatedMaterialsCost)&&(
              <div style={{background:"#0d1f14",border:"1px solid #1e6b3c",borderRadius:10,padding:"16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:11,color:"#4a9a6a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Customer Price</div>
                  <div style={{fontSize:36,fontWeight:800,color:"#2ecc71",letterSpacing:"-0.02em"}}>{fmt(calcPrice(hours,techMat||aiMat?.estimatedMaterialsCost))}</div>
                </div>
                <div style={{fontSize:12,color:"#4a9a6a",textAlign:"right",lineHeight:2.2}}>
                  <div>{hours} man-hrs</div>
                  <div>{fmt(techMat||aiMat?.estimatedMaterialsCost)} mat.</div>
                </div>
              </div>
            )}

            {!aiLoading&&!highVar&&techMat&&(
              <button onClick={()=>useMat(parseFloat(techMat))} style={{...btnBase,background:"#1e6b3c",color:"#fff"}}>Generate Customer Quote →</button>
            )}
            {!aiLoading&&!techMat&&aiMat&&!aiMat.error&&!clarQ&&(
              <button onClick={()=>useMat(aiMat.estimatedMaterialsCost)} style={{...btnBase,background:"#1e6b3c",color:"#fff"}}>Use AI Estimate & Generate Quote →</button>
            )}
          </div>
        )}

        {/* ── STEP 3: Review ── */}
        {step===3&&(
          <div>
            <div style={{background:"#1a1500",border:"1px solid #6b5a00",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontSize:13,color:"#f0d060",fontWeight:700,marginBottom:4}}>Review before sending</div>
              <div style={{fontSize:13,color:"#b09040",lineHeight:1.6}}>Read the title and description. Edit anything that doesn't match what you're actually doing. Hit Confirm when accurate.</div>
            </div>

            <div style={{background:"#0d1f14",border:"1px solid #1e6b3c",borderRadius:10,padding:"14px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:11,color:"#4a9a6a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>Customer Price</div>
                <div style={{fontSize:32,fontWeight:800,color:"#2ecc71",letterSpacing:"-0.02em"}}>{fmt(price)}</div>
              </div>
              <div style={{fontSize:12,color:"#4a9a6a",textAlign:"right",lineHeight:2}}>
                <div>{customer||"Customer"}</div>
                <div>{tech||"Tech"}</div>
              </div>
            </div>

            {lineLoading&&(
              <div style={{textAlign:"center",padding:"30px 0"}}>
                <div style={{color:"#6b7a8d",fontSize:14,marginBottom:6}}>Writing customer-facing quote...</div>
                <div style={{fontSize:12,color:"#3a4a5a"}}>Making it results-focused and professional</div>
              </div>
            )}

            {lineError&&!lineLoading&&(
              <div style={{background:"#1a0a0a",border:"1px solid #6b1e1e",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
                <div style={{fontSize:13,color:"#e74c3c",fontWeight:700,marginBottom:6}}>Couldn't generate line item</div>
                <div style={{fontSize:13,color:"#b06060",marginBottom:14,lineHeight:1.6}}>Tap retry or write the title and description manually below.</div>
                <button onClick={retryLineItem} style={{padding:"10px 18px",background:"#3d0d0d",color:"#e74c3c",border:"1px solid #6b1e1e",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Retry</button>
              </div>
            )}

            {!lineLoading&&(
              <div>
                <div style={{marginBottom:20}}>
                  <SL>LINE ITEM TITLE</SL>
                  <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8}}>Edit if the title doesn't match the actual job.</div>
                  <input value={reviewTitle} onChange={e=>setReviewTitle(e.target.value)} placeholder="e.g. Front Yard Rotor Upgrade & Coverage Restoration" style={{...inp,fontSize:15,fontWeight:600}}/>
                </div>
                <div style={{marginBottom:24}}>
                  <SL>LINE ITEM DESCRIPTION</SL>
                  <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8}}>Edit anything inaccurate or that doesn't reflect the actual job.</div>
                  <textarea value={reviewDesc} onChange={e=>setReviewDesc(e.target.value)} rows={6} placeholder="Describe what the customer gets — start with the result, then what we're doing to get there..." style={{...inp,resize:"vertical",lineHeight:1.75}}/>
                </div>

                <div style={{background:"#161b27",border:"1px solid #1e2a3a",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
                  <div style={{fontSize:11,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Internal Job Notes</div>
                  <QR label="Tech" value={tech||"—"}/>
                  <QR label="Customer" value={customer||"—"}/>
                  <QR label="Man-Hours" value={`${hours} hrs`}/>
                  <div style={{borderTop:"1px solid #1e2a3a",margin:"10px 0"}}/>
                  <div style={{fontSize:11,color:"#6b7a8d",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Scope Notes</div>
                  <div style={{fontSize:13,color:"#c8d0da",lineHeight:1.7}}>{scope}</div>
                </div>

                {trencher&&(
                  <div style={{marginBottom:20}}>
                    <SL>EQUIPMENT REMINDER</SL>
                    <TrencherAlert advice={trencher}/>
                  </div>
                )}

                <button onClick={confirmQuote} disabled={!reviewTitle.trim()||!reviewDesc.trim()}
                  style={{...btnBase,background:(!reviewTitle.trim()||!reviewDesc.trim())?"#1e2a3a":"#1e6b3c",color:(!reviewTitle.trim()||!reviewDesc.trim())?"#3a4a5a":"#fff"}}>
                  Looks Good — Confirm Quote ✓
                </button>
              </div>
            )}
          </div>
        )}

        {/* ── STEP 4: Final ── */}
        {step===4&&(
          <div>
            <div style={{background:"#0d1f14",border:"2px solid #2ecc71",borderRadius:12,padding:"20px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:11,color:"#4a9a6a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Confirmed — Ready for Jobber</div>
                <div style={{fontSize:42,fontWeight:800,color:"#2ecc71",letterSpacing:"-0.02em"}}>{fmt(price)}</div>
                <div style={{fontSize:12,color:"#4a9a6a",marginTop:4}}>
                  {customer&&<span>{customer}{" · "}</span>}
                  {tech&&<span>{tech}{" · "}</span>}
                  {hours} man-hrs
                </div>
              </div>
              <div style={{fontSize:22}}>✓</div>
            </div>

            <div style={{marginBottom:20}}>
              <SL>COPY INTO JOBBER</SL>
              <CopyBlock label="Line Item Title" text={reviewTitle}/>
              <CopyBlock label="Line Item Description" text={reviewDesc}/>
              <CopyBlock label="Price" text={String(Math.round(price))}/>
            </div>

            <div style={{background:"#161b27",border:"1px solid #1e2a3a",borderRadius:10,padding:"16px",marginBottom:20}}>
              <div style={{fontSize:11,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>Internal Summary</div>
              <QR label="Tech" value={tech||"—"}/>
              <QR label="Customer" value={customer||"—"}/>
              <QR label="Man-Hours" value={`${hours} hrs`}/>
              <div style={{borderTop:"1px solid #1e2a3a",margin:"10px 0"}}/>
              <div style={{fontSize:11,color:"#6b7a8d",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Scope Notes</div>
              <div style={{fontSize:13,color:"#c8d0da",lineHeight:1.7}}>{scope}</div>
            </div>

            <button onClick={reset} style={{...btnBase,background:"#1e6b3c",color:"#fff"}}>Start New Quote</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
