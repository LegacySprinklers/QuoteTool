<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Legacy Sprinklers — Field Quote</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0f1117;font-family:'Inter','Helvetica Neue',Arial,sans-serif;color:#f0f0f0;min-height:100vh;}
  input,select,textarea{font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:#1e6b3c !important;outline:none;}
  select option{background:#161b27;color:#f0f0f0;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

// ── PRICING CONSTANTS ──────────────────────────────
const LABOR_RATE      = 97;     // $/hr sell rate
const LABOR_MULT      = 1.30;   // labor markup before margin division
const MAT_MULT        = 1.35;   // materials markup before margin division
const MARGIN          = 0.50;   // target gross margin (divide-by, not subtract)
const TRENCH_RATE_LF  = 22;     // $/linear ft, blended flat rate (covers soil/risk/uncertainty)
const RISK_MULT       = {       // anatomy-touched compounding risk multiplier (small, stacks on real hours)
  backflow:   1.10,
  stopwaste:  1.10,
  mainline:   1.15,
  valve:      1.00,             // baseline, no premium — already well-estimated work
};
// Anatomy-specific real production-time anchors (hrs), used as a MINIMUM floor
// so the tech's hour estimate can't accidentally undercut known real job length.
const ANATOMY_HOURS = {
  stopwaste: 16,   // 1 day dig+plumb, 1 day test+backfill (1 tech)
  backflow:  12,   // 8hrs excavate+plumb, <4hrs return/test/backfill
};
// ──────────────────────────────────────────────────

const TECHS = ["Orion","Vick","Eric","Tyler"];

const CATALOG = [
  // Heads & Nozzles
  {id:"spray",      name:"Spray Head",                      cost:4,    unit:"head",     group:"Heads & Nozzles"},
  {id:"rotor",      name:"Rotor Head",                      cost:9,    unit:"head",     group:"Heads & Nozzles"},
  {id:"rb3500",     name:"Rainbird 3500 Rotor",             cost:10,   unit:"head",     group:"Heads & Nozzles"},
  {id:"nozzle",     name:"Spray Nozzle",                    cost:2,    unit:"nozzle",   group:"Heads & Nozzles"},
  // Valves & Controls
  {id:"valve",      name:"Valve",                           cost:22,   unit:"valve",    group:"Valves & Controls"},
  {id:"vbox_std",   name:"Valve Box (Standard)",            cost:40,   unit:"box",      group:"Valves & Controls"},
  {id:"vbox_jmb",   name:"Valve Box (Jumbo)",               cost:70,   unit:"box",      group:"Valves & Controls"},
  {id:"timer",      name:"Beehive Timer (12-zone)",         cost:130,  unit:"timer",    group:"Valves & Controls"},
  {id:"stopwaste",  name:"Stop & Waste Valve (Mueller)",    cost:300,  unit:"valve",    group:"Valves & Controls"},
  // Backflow
  {id:"bf_repair",  name:"Backflow Preventer — Repair",     cost:250,  unit:"repair",   group:"Backflow"},
  {id:"bf_replace", name:"Backflow Preventer — Full Replace",cost:600,  unit:"unit",     group:"Backflow"},
  // Manifolds
  {id:"manifold",   name:"Durabrand Modular Manifold",      cost:300,  unit:"manifold", group:"Manifolds"},
  // Pipe & Fittings
  {id:"pvc10",      name:"PVC Pipe (per 10ft)",             cost:6,    unit:"10ft",     group:"Pipe & Fittings"},
  {id:"poly50",     name:"Poly Pipe (per 50ft)",            cost:14,   unit:"50ft",     group:"Pipe & Fittings"},
  {id:"fitting",    name:"PVC Fitting/Coupling",            cost:3,    unit:"fitting",  group:"Pipe & Fittings"},
  // Drip
  {id:"drip10",     name:"Drip Line (per 10ft)",            cost:3.5,  unit:"10ft",     group:"Drip"},
  {id:"drip_repair",name:"Drip Line Repair (per section)",  cost:25,   unit:"section",  group:"Drip"},
  // Electrical
  {id:"wire50",     name:"Wire (per 50ft)",                 cost:12,   unit:"50ft",     group:"Electrical"},
  {id:"connectors", name:"Wire Connectors (pkg)",           cost:3,    unit:"pkg",      group:"Electrical"},
  // Other
  {id:"gravel",     name:"Gravel/Sand (per bag)",           cost:8,    unit:"bag",      group:"Other"},
  {id:"boring_mob", name:"Boring — Mobilization Fee",       cost:300,  unit:"flat",     group:"Boring"},
  {id:"boring_ft",  name:"Boring (per linear foot)",        cost:15,   unit:"ft",       group:"Boring"},
];

const GROUPS = [...new Set(CATALOG.map(c=>c.group))];

function isLarge(h){ return (parseFloat(h)||0) >= 8; } // kept for display purposes only, no longer changes pricing logic

function calcPrice(h, m, trenchFt, anatomyFlags){
  const hrs   = parseFloat(h)||0;
  const mat   = parseFloat(m)||0;
  const ft    = parseFloat(trenchFt)||0;

  // 1. Trenching priced at flat $/LF (already includes soil/risk/uncertainty buffer) — NOT hours.
  const trenchPrice = ft * TRENCH_RATE_LF;

  // 2. Anatomy floor: if a checked anatomy type's real-world hours exceed what was entered,
  //    use the real production-time floor instead, so a job can't be accidentally underbid.
  let anatomyFloorHrs = 0;
  (anatomyFlags||[]).forEach(flag=>{
    if(ANATOMY_HOURS[flag]) anatomyFloorHrs += ANATOMY_HOURS[flag];
  });
  const effectiveHrs = Math.max(hrs, anatomyFloorHrs);

  // 3. Base labor+materials, margin-protected the SAME WAY regardless of job size — no cliff.
  let base = (effectiveHrs * LABOR_MULT * LABOR_RATE) + (mat * MAT_MULT);

  // 4. Compounding risk multiplier for anatomy types touched (stacks, doesn't replace).
  let riskMult = 1.0;
  (anatomyFlags||[]).forEach(flag=>{
    if(RISK_MULT[flag]) riskMult *= RISK_MULT[flag];
  });
  base = base * riskMult;

  const laborMatPrice = base / MARGIN;

  return trenchPrice + laborMatPrice;
}

function fmt(val){
  if(!val&&val!==0) return "—";
  return "$"+Number(val).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",");
}

function buildTitle(selectedParts){
  const has=(id)=>selectedParts.some(p=>p.id===id&&p.qty>0);
  const hasGroup=(g)=>selectedParts.some(p=>p.group===g&&p.qty>0);
  const parts=[];
  if(has("rb3500")||has("rotor")) parts.push("Rotor Upgrade");
  else if(has("spray")) parts.push("Spray Head Service");
  if(has("valve")) parts.push("Valve Repair");
  if(has("timer")) parts.push("Timer Upgrade");
  if(has("bf_repair")) parts.push("Backflow Repair");
  if(has("bf_replace")) parts.push("Backflow Replacement");
  if(has("manifold")) parts.push("Manifold Rebuild");
  if(has("stopwaste")) parts.push("Stop & Waste Replacement");
  if(hasGroup("Drip")) parts.push("Drip Line Service");
  if(hasGroup("Boring")) parts.push("Underground Boring");
  if(parts.length===0) return "Irrigation System Service & Repair";
  if(parts.length===1) return parts[0]+" & System Service";
  if(parts.length===2) return parts.join(" & ");
  return parts[0]+", "+parts[1]+" & Additional Services";
}

function buildDescription(selectedParts, customParts){
  const all=[...selectedParts.filter(p=>p.qty>0),...customParts.filter(p=>p.name&&p.qty>0)];
  if(all.length===0) return "";

  const has=(id)=>selectedParts.some(p=>p.id===id&&p.qty>0);
  const get=(id)=>selectedParts.find(p=>p.id===id);

  // Result sentence
  let result="Your irrigation system will be restored to full working order with improved reliability and coverage.";
  const rotors=selectedParts.filter(p=>(p.id==="rb3500"||p.id==="rotor")&&p.qty>0);
  const sprays=selectedParts.filter(p=>p.id==="spray"&&p.qty>0);
  if(rotors.length>0&&sprays.length===0) result="Your system will deliver consistent, even coverage across the target area.";
  else if(sprays.length>0&&rotors.length===0) result="Your irrigation system will provide reliable, uniform coverage throughout the affected zones.";
  else if(rotors.length>0&&sprays.length>0) result="Your irrigation system will be upgraded for improved coverage and efficiency across all zones.";
  else if(has("bf_repair")||has("bf_replace")) result="Your backflow preventer will be fully serviced and compliant, protecting your home's water supply.";
  else if(has("manifold")) result="Your irrigation manifold will be rebuilt for reliable zone control and long-term durability.";
  else if(has("timer")) result="Your system will run on a reliable automated schedule with full zone control and programmable flexibility.";
  else if(has("stopwaste")) result="Your main irrigation shutoff will be replaced for dependable water control throughout the season.";

  // Work items
  let items=[];
  const phrases={
    "spray":      p=>`${p.qty} spray head${p.qty>1?"s":""}`,
    "rotor":      p=>`${p.qty} rotor head${p.qty>1?"s":""}`,
    "rb3500":     p=>`${p.qty} Rainbird 3500 rotor head${p.qty>1?"s":""}`,
    "nozzle":     p=>`${p.qty} spray nozzle${p.qty>1?"s":""}`,
    "valve":      p=>`${p.qty} zone valve${p.qty>1?"s":""}`,
    "vbox_std":   p=>`${p.qty} standard valve box${p.qty>1?"es":""}`,
    "vbox_jmb":   p=>`${p.qty} jumbo valve box${p.qty>1?"es":""}`,
    "timer":      p=>`a new 12-zone Beehive programmable timer`,
    "stopwaste":  p=>`a new Mueller stop & waste valve`,
    "bf_repair":  p=>`backflow preventer repair`,
    "bf_replace": p=>`full backflow preventer replacement`,
    "manifold":   p=>`${p.qty} Durabrand modular manifold${p.qty>1?"s":""}`,
    "pvc10":      p=>`${p.qty*10} ft of PVC pipe`,
    "poly50":     p=>`${p.qty*50} ft of poly pipe`,
    "fitting":    p=>`${p.qty} PVC fitting${p.qty>1?"s":""}`,
    "drip10":     p=>`${p.qty*10} ft of drip line`,
    "drip_repair":p=>`${p.qty} drip line repair${p.qty>1?"s":""}`,
    "wire50":     p=>`${p.qty*50} ft of wire`,
    "connectors": p=>`wire connectors`,
    "gravel":     p=>`${p.qty} bag${p.qty>1?"s":""} of gravel`,
    "boring_mob": p=>`boring mobilization`,
    "boring_ft":  p=>`${p.qty} ft of underground boring`,
  };
  selectedParts.filter(p=>p.qty>0).forEach(p=>{
    const fn=phrases[p.id];
    if(fn) items.push(fn(p));
    else items.push(`${p.qty} ${p.name.toLowerCase()}`);
  });
  customParts.filter(p=>p.name&&p.qty>0).forEach(p=>items.push(`${p.qty} ${p.name.toLowerCase()}`));

  let workSentence="";
  if(items.length===1) workSentence=`We will install ${items[0]} to achieve this.`;
  else if(items.length===2) workSentence=`We will install ${items[0]} and ${items[1]}.`;
  else if(items.length>2) workSentence=`We will install ${items.slice(0,-1).join(", ")}, and ${items[items.length-1]}.`;

  const closing="All work is completed to manufacturer specifications and backed by Legacy Sprinklers' quality standard.";
  return [result,workSentence,closing].filter(Boolean).join(" ");
}

const inp={width:"100%",background:"#0f1117",border:"1px solid #1e2a3a",borderRadius:8,padding:"10px 12px",color:"#f0f0f0",fontSize:15,outline:"none",boxSizing:"border-box"};
const btnBase={padding:"14px 18px",border:"none",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",marginTop:8};

function SL({children}){return <div style={{fontSize:11,color:"#1e6b3c",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12,paddingBottom:8,borderBottom:"1px solid #1e2a3a"}}>{children}</div>;}
function FL({children}){return <div style={{fontSize:11,color:"#6b7a8d",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>{children}</div>;}
function QR({label,value}){return <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}><span style={{color:"#6b7a8d"}}>{label}</span><span>{value}</span></div>;}

function StepBar({current,goTo}){
  const steps=["Job Info","Materials","Review","Final"];
  return(
    <div style={{display:"flex",alignItems:"center",padding:"12px 16px",background:"#0f1117",borderBottom:"1px solid #1e2a3a",overflowX:"auto"}}>
      {steps.map((s,i)=>{
        const num=i+1;const active=num===current;const done=num<current;
        return(
          <React.Fragment key={s}>
            <div onClick={()=>done&&goTo(num)} style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,cursor:done?"pointer":"default"}}>
              <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,
                background:done||active?"#1e6b3c":"#1e2a3a",color:done||active?"#fff":"#3a4a5a",
                border:active?"2px solid #2ecc71":done?"2px solid #2ecc71":"2px solid transparent"}}>
                {done?"✓":num}
              </div>
              <div style={{fontSize:11,color:active?"#f0f0f0":done?"#2ecc71":"#3a4a5a",fontWeight:active?700:400,whiteSpace:"nowrap",textDecoration:done?"underline":"none"}}>{s}</div>
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:1,background:"#1e2a3a",margin:"0 8px",minWidth:8}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function CopyBlock({label,text}){
  const [copied,setCopied]=useState(false);
  const copy=()=>{
    const el=document.createElement("textarea");el.value=text;el.style.position="fixed";el.style.opacity="0";
    document.body.appendChild(el);el.focus();el.select();
    try{document.execCommand("copy");}catch(e){}
    document.body.removeChild(el);
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  };
  return(
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={{fontSize:11,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
        <button onClick={copy} style={{background:copied?"#0d3d20":"#1e2a3a",border:copied?"1px solid #2ecc71":"1px solid #2a3a4a",color:copied?"#2ecc71":"#f0f0f0",borderRadius:6,padding:"5px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>
          {copied?"Copied!":"Copy"}
        </button>
      </div>
      <div style={{background:"#0f1117",border:"1px solid #1e2a3a",borderRadius:8,padding:"12px 14px",fontSize:14,color:"#c8d0da",lineHeight:1.75,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{text}</div>
    </div>
  );
}

function QtyRow({item,qty,onChange}){
  const active=qty>0;
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:active?"#0d1f14":"#161b27",border:active?"1px solid #1e6b3c":"1px solid transparent",borderRadius:8,marginBottom:6,transition:"all 0.15s"}}>
      <div style={{flex:1}}>
        <div style={{fontSize:14,color:active?"#f0f0f0":"#8a9ab0"}}>{item.name}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <button onClick={()=>onChange(Math.max(0,qty-1))} style={{width:32,height:32,background:"#1e2a3a",border:"none",borderRadius:6,color:"#f0f0f0",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>−</button>
        <div style={{width:28,textAlign:"center",fontSize:16,fontWeight:700,color:active?"#2ecc71":"#3a4a5a"}}>{qty}</div>
        <button onClick={()=>onChange(qty+1)} style={{width:32,height:32,background:"#1e2a3a",border:"none",borderRadius:6,color:"#f0f0f0",fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
      </div>
    </div>
  );
}

function CustomPartRow({part,onChange,onRemove}){
  return(
    <div style={{background:"#161b27",borderRadius:8,padding:"10px 12px",marginBottom:8,border:"1px solid #1e2a3a"}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <input value={part.name} onChange={e=>onChange({...part,name:e.target.value})} placeholder="Part name (from supply)" style={{...inp,flex:1,fontSize:13,padding:"8px 10px"}}/>
        <button onClick={onRemove} style={{background:"none",border:"none",color:"#6b1e1e",fontSize:22,cursor:"pointer",padding:"0 4px",flexShrink:0,lineHeight:1}}>×</button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
        <div style={{fontSize:12,color:"#6b7a8d"}}>Qty:</div>
        <button onClick={()=>onChange({...part,qty:Math.max(1,part.qty-1)})} style={{width:28,height:28,background:"#1e2a3a",border:"none",borderRadius:6,color:"#f0f0f0",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
        <div style={{width:24,textAlign:"center",fontSize:14,fontWeight:700,color:"#2ecc71"}}>{part.qty}</div>
        <button onClick={()=>onChange({...part,qty:part.qty+1})} style={{width:28,height:28,background:"#1e2a3a",border:"none",borderRadius:6,color:"#f0f0f0",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
        <div style={{marginLeft:"auto",fontSize:12,color:"#6b7a8d"}}>Price from supply:</div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{color:"#6b7a8d",fontSize:13}}>$</span>
          <input type="number" min="0" step="1" value={part.price||""} onChange={e=>onChange({...part,price:parseFloat(e.target.value)||0})} placeholder="0" style={{...inp,width:70,fontSize:13,padding:"6px 8px"}}/>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [tech,setTech]=useState("");
  const [customer,setCustomer]=useState("");
  const [scope,setScope]=useState("");
  const [hours,setHours]=useState("");
  const [trenchFt,setTrenchFt]=useState("");
  const [anatomy,setAnatomy]=useState([]); // e.g. ["backflow","stopwaste"]
  const [parts,setParts]=useState(CATALOG.map(c=>({...c,qty:0})));
  const [customParts,setCustomParts]=useState([]);
  const [specialtyNotes,setSpecialtyNotes]=useState("");
  const [reviewTitle,setReviewTitle]=useState("");
  const [reviewDesc,setReviewDesc]=useState("");
  const [step,setStep]=useState(1);

  const rawMat=parts.reduce((s,p)=>s+p.cost*p.qty,0)+customParts.reduce((s,p)=>s+(p.price||0)*p.qty,0);
  const price=calcPrice(hours,rawMat,trenchFt,anatomy);
  const selectedParts=parts.filter(p=>p.qty>0);
  const allCustom=customParts.filter(p=>p.name&&p.qty>0);

  const toggleAnatomy=(key)=>setAnatomy(prev=>prev.includes(key)?prev.filter(k=>k!==key):[...prev,key]);

  const updatePart=(id,qty)=>setParts(prev=>prev.map(p=>p.id===id?{...p,qty}:p));
  const addCustom=()=>setCustomParts(prev=>[...prev,{id:Date.now(),name:"",price:0,qty:1}]);
  const updateCustom=(id,updated)=>setCustomParts(prev=>prev.map(p=>p.id===id?updated:p));
  const removeCustom=(id)=>setCustomParts(prev=>prev.filter(p=>p.id!==id));

  const goToReview=()=>{
    setReviewTitle(buildTitle(selectedParts));
    setReviewDesc(buildDescription(selectedParts,allCustom));
    setStep(3);
  };

  const reset=()=>{
    setTech("");setCustomer("");setScope("");setHours("");setTrenchFt("");setAnatomy([]);
    setParts(CATALOG.map(c=>({...c,qty:0})));
    setCustomParts([]);setSpecialtyNotes("");
    setReviewTitle("");setReviewDesc("");setStep(1);
  };

  return(
    <div style={{minHeight:"100vh",background:"#0f1117",paddingBottom:60}}>
      <div style={{background:"#161b27",borderBottom:"2px solid #1e6b3c",padding:"16px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
        <div style={{width:32,height:32,background:"#1e6b3c",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}}>💧</div>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>LEGACY SPRINKLERS</div>
          <div style={{fontSize:10,color:"#6b7a8d",letterSpacing:"0.08em",textTransform:"uppercase"}}>Custom Field Quote</div>
        </div>
      </div>

      <StepBar current={step} goTo={n=>n<step&&setStep(n)}/>

      <div style={{maxWidth:560,margin:"0 auto",padding:"20px 16px"}}>

        {/* ── STEP 1 ── */}
        {step===1&&(
          <div>
            <div style={{marginBottom:24}}>
              <SL>JOB INFO</SL>
              <div style={{display:"flex",gap:10,marginBottom:14}}>
                <div style={{flex:1}}><FL>Tech</FL>
                  <select value={tech} onChange={e=>setTech(e.target.value)} style={inp}>
                    <option value="">Select...</option>
                    {TECHS.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}><FL>Customer Name</FL>
                  <input value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="John Smith" style={inp}/>
                </div>
              </div>
            </div>

            <div style={{marginBottom:24}}>
              <SL>SCOPE OF WORK</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8,lineHeight:1.6}}>Describe the job in your own words. This becomes your internal scope record.</div>
              <textarea value={scope} onChange={e=>setScope(e.target.value)} placeholder="e.g. Replace pop-up sprayers in front yard with Rainbird 3500 rotors, install new timer, cap 2 heads, relocate 2 heads, ~25 ft of trenching." rows={5} style={{...inp,resize:"vertical",lineHeight:1.7}}/>
            </div>

            <div style={{marginBottom:28}}>
              <SL>TOTAL MAN-HOURS ON SITE</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8,lineHeight:1.6}}>Total crew hours. Two techs × 1.5 hrs each = enter 3. Biggest cost driver — be accurate.</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input type="number" min="0" step="0.25" value={hours} onChange={e=>setHours(e.target.value)} placeholder="e.g. 2.5" style={{...inp,width:120,fontSize:18}}/>
                {hours&&<div style={{fontSize:13,color:"#6b7a8d"}}>{hours} man-hr{parseFloat(hours)!==1?"s":""}</div>}
              </div>
            </div>

            <div style={{marginBottom:24}}>
              <SL>TRENCHING (IF ANY)</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8,lineHeight:1.6}}>Linear feet of trenching. Priced separately at ${TRENCH_RATE_LF}/ft — already covers soil/risk variability. Leave blank if none.</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input type="number" min="0" step="1" value={trenchFt} onChange={e=>setTrenchFt(e.target.value)} placeholder="e.g. 45" style={{...inp,width:120,fontSize:18}}/>
                {trenchFt&&<div style={{fontSize:13,color:"#6b7a8d"}}>{trenchFt} ft → {fmt(parseFloat(trenchFt)*TRENCH_RATE_LF)}</div>}
              </div>
            </div>

            <div style={{marginBottom:28}}>
              <SL>SYSTEM ANATOMY TOUCHED</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:10,lineHeight:1.6}}>Check everything this job involves. Stacks automatically — no math required.</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {[
                  {key:"stopwaste",label:"Stop & Waste"},
                  {key:"backflow", label:"Backflow Preventer"},
                  {key:"mainline", label:"Main Line"},
                  {key:"valve",    label:"Valve Work"},
                ].map(a=>{
                  const on=anatomy.includes(a.key);
                  return(
                    <button key={a.key} onClick={()=>toggleAnatomy(a.key)} style={{
                      padding:"10px 14px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",
                      background:on?"#0d3d20":"#161b27",border:on?"1px solid #2ecc71":"1px solid #1e2a3a",
                      color:on?"#2ecc71":"#8a9ab0"}}>
                      {on?"✓ ":""}{a.label}
                    </button>
                  );
                })}
              </div>
            </div>

            <button onClick={()=>setStep(2)} disabled={!scope.trim()||!hours||!tech}
              style={{...btnBase,background:(!scope.trim()||!hours||!tech)?"#1e2a3a":"#1e6b3c",color:(!scope.trim()||!hours||!tech)?"#3a4a5a":"#fff"}}>
              Select Materials →
            </button>
            {!tech&&<div style={{fontSize:12,color:"#e74c3c",marginTop:8,textAlign:"center"}}>Select a tech to continue</div>}
          </div>
        )}

        {/* ── STEP 2 ── */}
        {step===2&&(
          <div>
            <div style={{background:"#161b27",border:"1px solid #1e2a3a",borderRadius:10,padding:"12px 16px",marginBottom:20}}>
              <div style={{fontSize:13,color:"#c8d0da",lineHeight:1.6}}>{scope}</div>
              <div style={{marginTop:8,fontSize:13,color:"#4a9a6a"}}>{hours} man-hr{parseFloat(hours)!==1?"s":""} · {tech}</div>
            </div>

            <div style={{marginBottom:8}}>
              <SL>SELECT MATERIALS</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:16,lineHeight:1.6}}>Tap + for each part you're installing. Quantities carry into the customer quote.</div>

              {GROUPS.map(group=>{
                const groupParts=parts.filter(p=>p.group===group);
                return(
                  <div key={group} style={{marginBottom:20}}>
                    <div style={{fontSize:11,color:"#4a6a8a",fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8,paddingLeft:2}}>{group}</div>
                    {groupParts.map(p=>(
                      <QtyRow key={p.id} item={p} qty={p.qty} onChange={qty=>updatePart(p.id,qty)}/>
                    ))}
                  </div>
                );
              })}
            </div>

            <div style={{marginBottom:24}}>
              <SL>SPECIALTY PARTS</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:12,lineHeight:1.6}}>Parts not in the list above. Get the price from supply and enter it here.</div>
              {customParts.map(p=>(
                <CustomPartRow key={p.id} part={p} onChange={updated=>updateCustom(p.id,updated)} onRemove={()=>removeCustom(p.id)}/>
              ))}
              <button onClick={addCustom} style={{width:"100%",padding:"11px",background:"#161b27",border:"1px dashed #2a3a4a",borderRadius:8,color:"#6b7a8d",fontSize:13,fontWeight:600,cursor:"pointer",marginTop:4}}>
                + Add Specialty Part
              </button>
            </div>

            <div style={{marginBottom:24}}>
              <SL>INTERNAL NOTES</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8}}>Optional — anything to flag for Tyler. Not shown to customer.</div>
              <textarea value={specialtyNotes} onChange={e=>setSpecialtyNotes(e.target.value)} placeholder="e.g. Soil was rocky, took longer than expected. Zone 4 may need follow-up." rows={3} style={{...inp,resize:"vertical",lineHeight:1.6}}/>
            </div>

            {hours&&(
              <div style={{background:"#0d1f14",border:"1px solid #1e6b3c",borderRadius:10,padding:"16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:11,color:"#4a9a6a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Customer Price</div>
                  <div style={{fontSize:36,fontWeight:800,color:"#2ecc71",letterSpacing:"-0.02em"}}>{fmt(price)}</div>
                </div>
                <div style={{fontSize:12,color:"#4a9a6a",textAlign:"right",lineHeight:2.2}}>
                  <div>{hours} man-hrs</div>
                  {selectedParts.length>0&&<div>{selectedParts.length} part type{selectedParts.length>1?"s":""}</div>}
                </div>
              </div>
            )}

            <button onClick={goToReview} style={{...btnBase,background:"#1e6b3c",color:"#fff"}}>
              Review Quote →
            </button>
          </div>
        )}

        {/* ── STEP 3 ── */}
        {step===3&&(
          <div>
            <div style={{background:"#1a1500",border:"1px solid #6b5a00",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontSize:13,color:"#f0d060",fontWeight:700,marginBottom:4}}>Review before sending</div>
              <div style={{fontSize:13,color:"#b09040",lineHeight:1.6}}>Read the title and description carefully. Edit anything that doesn't match the job. Hit Confirm when accurate.</div>
            </div>

            <div style={{background:"#0d1f14",border:"1px solid #1e6b3c",borderRadius:10,padding:"14px 16px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:11,color:"#4a9a6a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>Customer Price</div>
                <div style={{fontSize:32,fontWeight:800,color:"#2ecc71",letterSpacing:"-0.02em"}}>{fmt(price)}</div>
              </div>
              <div style={{fontSize:12,color:"#4a9a6a",textAlign:"right",lineHeight:2}}>
                <div>{customer||"Customer"}</div>
                <div>{tech}</div>
              </div>
            </div>

            <div style={{marginBottom:20}}>
              <SL>LINE ITEM TITLE</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8}}>Edit to match the actual job.</div>
              <input value={reviewTitle} onChange={e=>setReviewTitle(e.target.value)} style={{...inp,fontSize:15,fontWeight:600}}/>
            </div>

            <div style={{marginBottom:24}}>
              <SL>LINE ITEM DESCRIPTION</SL>
              <div style={{fontSize:12,color:"#3a4a5a",marginBottom:8}}>Result-focused with quantities for scope protection. Edit if anything is off.</div>
              <textarea value={reviewDesc} onChange={e=>setReviewDesc(e.target.value)} rows={6} style={{...inp,resize:"vertical",lineHeight:1.75}}/>
            </div>

            {(selectedParts.length>0||allCustom.length>0)&&(
              <div style={{background:"#161b27",border:"1px solid #1e2a3a",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
                <div style={{fontSize:11,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Materials on This Job</div>
                {selectedParts.map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6,color:"#c8d0da"}}>
                    <span>{p.name}</span><span style={{color:"#6b7a8d"}}>× {p.qty}</span>
                  </div>
                ))}
                {allCustom.map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6,color:"#c8d0da"}}>
                    <span>{p.name}</span><span style={{color:"#6b7a8d"}}>× {p.qty}</span>
                  </div>
                ))}
              </div>
            )}

            <div style={{background:"#161b27",border:"1px solid #1e2a3a",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
              <div style={{fontSize:11,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Internal Job Notes</div>
              <QR label="Tech" value={tech}/>
              <QR label="Customer" value={customer||"—"}/>
              <QR label="Man-Hours" value={`${hours} hrs`}/>
              <div style={{borderTop:"1px solid #1e2a3a",margin:"10px 0"}}/>
              <div style={{fontSize:11,color:"#6b7a8d",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Scope Notes</div>
              <div style={{fontSize:13,color:"#c8d0da",lineHeight:1.7,marginBottom:specialtyNotes?12:0}}>{scope}</div>
              {specialtyNotes&&<>
                <div style={{fontSize:11,color:"#6b7a8d",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Additional Notes</div>
                <div style={{fontSize:13,color:"#c8d0da",lineHeight:1.7}}>{specialtyNotes}</div>
              </>}
            </div>

            <button onClick={()=>setStep(4)} disabled={!reviewTitle.trim()||!reviewDesc.trim()}
              style={{...btnBase,background:(!reviewTitle.trim()||!reviewDesc.trim())?"#1e2a3a":"#1e6b3c",color:(!reviewTitle.trim()||!reviewDesc.trim())?"#3a4a5a":"#fff"}}>
              Looks Good — Confirm Quote ✓
            </button>
          </div>
        )}

        {/* ── STEP 4 ── */}
        {step===4&&(
          <div>
            <div style={{background:"#0d1f14",border:"2px solid #2ecc71",borderRadius:12,padding:"20px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:11,color:"#4a9a6a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Confirmed — Ready for Jobber</div>
                <div style={{fontSize:42,fontWeight:800,color:"#2ecc71",letterSpacing:"-0.02em"}}>{fmt(price)}</div>
                <div style={{fontSize:12,color:"#4a9a6a",marginTop:4}}>
                  {customer&&<span>{customer}{" · "}</span>}{tech}{" · "}{hours} man-hrs
                </div>
              </div>
              <div style={{fontSize:22}}>✓</div>
            </div>

            <div style={{marginBottom:20}}>
              <SL>COPY INTO JOBBER</SL>
              <CopyBlock label="Line Item Title" text={reviewTitle}/>
              <CopyBlock label="Line Item Description" text={reviewDesc}/>
              <CopyBlock label="Price" text={String(Math.round(price))}/>
            </div>

            <div style={{background:"#161b27",border:"1px solid #1e2a3a",borderRadius:10,padding:"16px",marginBottom:20}}>
              <div style={{fontSize:11,color:"#6b7a8d",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>Internal Summary</div>
              <QR label="Tech" value={tech}/>
              <QR label="Customer" value={customer||"—"}/>
              <QR label="Man-Hours" value={`${hours} hrs`}/>
              {(selectedParts.length>0||allCustom.length>0)&&<>
                <div style={{borderTop:"1px solid #1e2a3a",margin:"10px 0"}}/>
                <div style={{fontSize:11,color:"#6b7a8d",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Materials</div>
                {selectedParts.map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4,color:"#c8d0da"}}>
                    <span>{p.name} × {p.qty}</span>
                  </div>
                ))}
                {allCustom.map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4,color:"#c8d0da"}}>
                    <span>{p.name} × {p.qty}</span>
                  </div>
                ))}
              </>}
              <div style={{borderTop:"1px solid #1e2a3a",margin:"10px 0"}}/>
              <div style={{fontSize:11,color:"#6b7a8d",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Scope Notes</div>
              <div style={{fontSize:13,color:"#c8d0da",lineHeight:1.7,marginBottom:specialtyNotes?12:0}}>{scope}</div>
              {specialtyNotes&&<>
                <div style={{fontSize:11,color:"#6b7a8d",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Additional Notes</div>
                <div style={{fontSize:13,color:"#c8d0da",lineHeight:1.7}}>{specialtyNotes}</div>
              </>}
            </div>

            <button onClick={reset} style={{...btnBase,background:"#1e6b3c",color:"#fff"}}>Start New Quote</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
